name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --locked
      - name: Run tests
        run: uv run pytest -q
      - name: Generate LangGraph public-data traces
        run: uv run agent-trace-tool run-ad-harness --data data/product_ads_sample.json --limit 3 --out examples/langgraph_ad_traces.jsonl
      - name: Run sample evaluation
        run: uv run agent-trace-tool evaluate examples/sample_trace.jsonl --cases examples/eval_cases.json
      - name: Run LangGraph public-data evaluation
        run: uv run agent-trace-tool evaluate examples/langgraph_ad_traces.jsonl --cases examples/langgraph_ad_eval_cases.json
